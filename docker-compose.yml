services:
  app:
    build: .
    image: human2:latest
    ports:
      - '60000:60000'
    environment:
      - HOST=0.0.0.0
      - PORT=60000
      - DATA_FILE=data/app.db
      - STATIC_DIR=../frontend/dist
      - JWT_SECRET=change-this-in-production
      - JWT_EXPIRES_IN=7d
      # AI Provider: http (generic), mock (for testing), or direct (OpenAI-style)
      # 具体 AI 厂商请在设置页面配置 model_configs
      - AI_PROVIDER=http
      - AI_TIMEOUT_MS=45000
      - AI_AUTH_HEADER=Authorization
      - AI_MAX_RETRIES=2
      - AI_RETRY_DELAY_MS=600
      - VIDEO_MAX_CONCURRENT=2
    volumes:
      - ./backend/data:/app/backend/data
